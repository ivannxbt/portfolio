name: Validate Configuration Files

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Validate YAML files
        run: |
          echo "🔍 Validating YAML files..."
          find . -name "*.yml" -o -name "*.yaml" | while read file; do
            echo "Checking $file"
            python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done
          echo "✅ All YAML files are valid"

      - name: Validate JSON files
        run: |
          echo "🔍 Validating JSON files..."
          find . -name "*.json" | while read file; do
            echo "Checking $file"
            python3 -c "import json; json.load(open('$file'))" || exit 1
          done
          echo "✅ All JSON files are valid"

      - name: Validate Markdown files
        run: |
          echo "🔍 Checking Markdown files..."
          find . -name "*.md" | while read file; do
            echo "Found: $file"
          done
          echo "✅ Markdown files check complete"

      - name: Type check
        run: npm run typecheck

      - name: Verify directory structure
        run: |
          echo "🔍 Verifying directory structure..."
          dirs=(".agents" ".claude" ".cursor" ".codex" ".gemini" ".github" "scripts")
          for dir in "${dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ $dir exists"
            else
              echo "❌ $dir is missing"
              exit 1
            fi
          done
          echo "✅ Directory structure is valid"
